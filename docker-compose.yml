# Local PostgreSQL for GrocerEase (team dev / when shared DB is down)
# Usage: docker compose up -d
# Then: DATABASE_URL=postgresql://postgres:postgres@localhost:5432/grocerease npx prisma migrate deploy && npm run db:seed

services:
  postgres:
    image: postgres:16-alpine
    container_name: grocerease-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grocerease
    volumes:
      - grocerease_pgdata:/var/lib/postgresql/data

volumes:
  grocerease_pgdata:
