# LLM-assisted development specs using GitHub Models (GITHUB_TOKEN + models: read).
# When a PR into main receives an **approved** review, infer story slug from
# PR title/body (e.g. "Story 4", "US4"), with label `dev-spec:*` as fallback.

name: Dev specification (on PR approval)

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  models: read

concurrency:
  group: dev-spec-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    if: |
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve dev-spec slug from PR text or labels
        id: slug
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python3 << 'PY'
          import json, os, re
          title = os.environ.get("PR_TITLE", "") or ""
          body = os.environ.get("PR_BODY", "") or ""
          text = f"{title}\n{body}"
          labels = json.loads(os.environ["LABELS_JSON"])
          slug = ""
          # Preferred: derive from PR text so teams do not need labels.
          # Matches "Story 4", "story: 4", "US4", "US 4", etc.
          m = re.search(r"(?i)\b(?:story|us)\s*[:#-]?\s*(\d{1,3})\b", text)
          if m:
              slug = f"US{int(m.group(1))}"
          # Fallback: explicit label like dev-spec:US5
          if not slug:
              for label in labels:
                  name = label.get("name", "")
                  if name.startswith("dev-spec:"):
                      slug = name.split(":", 1)[1].strip()
                      break
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"slug={slug}\n")
          PY

      - name: Skip when no story number or dev-spec label
        if: steps.slug.outputs.slug == ''
        run: |
          echo "No story marker found (expected 'Story N' or 'USN' in PR title/body), and no dev-spec:* label fallback."

      - name: Prepare context, diff, and instruction files
        id: prep
        if: steps.slug.outputs.slug != ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SLUG: ${{ steps.slug.outputs.slug }}
          PR_JSON: ${{ toJson(github.event.pull_request) }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import json, os, pathlib, re
          pr = json.loads(os.environ["PR_JSON"])
          title = pr.get("title") or ""
          body = (pr.get("body") or "").strip()
          num = pr.get("number")
          repo = os.environ["REPO"]
          slug = os.environ["SLUG"]
          pathlib.Path("context.md").write_text(
              f"# PR #{num}: {title}\n\n{body}\n",
              encoding="utf-8",
          )
          pathlib.Path("story_slug.md").write_text(slug + "\n", encoding="utf-8")
          refs = sorted(set(re.findall(r"(?i)\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?)\\s+#(\\d+)\\b", body)))
          if refs:
              lines = [f"- https://github.com/{repo}/issues/{n}" for n in refs]
          else:
              lines = ["None found in PR metadata"]
          pathlib.Path("issue_links.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          mkdir -p docs/dev-specs
          SPEC_FILE="docs/dev-specs/${SLUG}-development-spec.md"
          echo "spec_file=${SPEC_FILE}" >> "$GITHUB_OUTPUT"
          git fetch origin main
          if git cat-file -e "origin/main:${SPEC_FILE}" 2>/dev/null; then
            git show "origin/main:${SPEC_FILE}" > existing_spec.md
            cp docs/dev-specs/prompts/spec-update.md instructions.md
          else
            cp docs/dev-specs/prompts/spec-new.md instructions.md
            echo "(none yet — generate full specification)" > existing_spec.md
          fi
          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"
          git diff "$BASE_SHA"..."$HEAD_SHA" -- \
            . ':(exclude)package-lock.json' ':(exclude)*.png' ':(exclude)*.jpg' \
            ':(exclude)*.jpeg' ':(exclude)*.webp' ':(exclude)*.gif' > raw.diff || true
          git diff --name-only "$BASE_SHA"..."$HEAD_SHA" -- \
            . ':(exclude)package-lock.json' ':(exclude)*.png' ':(exclude)*.jpg' \
            ':(exclude)*.jpeg' ':(exclude)*.webp' ':(exclude)*.gif' > changed-files.txt || true
          if [ -s changed-files.txt ]; then
            awk '{print "- " $0}' changed-files.txt > changed_files.md
          else
            echo "- (no text file changes detected in diff scope)" > changed_files.md
          fi
          head -c 120000 raw.diff > diff.txt || cp raw.diff diff.txt
          echo "diff_bytes=$(wc -c < diff.txt)" >> "$GITHUB_OUTPUT"

      - name: Run GitHub Models (ai-inference)
        id: llm
        if: steps.slug.outputs.slug != ''
        uses: actions/ai-inference@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prompt-file: .github/prompts/dev-spec-generate.prompt.yml
          model: openai/gpt-4o
          file_input: |
            pr_context: ./context.md
            story_slug: ./story_slug.md
            issue_links: ./issue_links.md
            changed_files: ./changed_files.md
            instructions: ./instructions.md
            existing_spec: ./existing_spec.md
            code_diff: ./diff.txt

      - name: Stage generated spec to temp
        if: steps.slug.outputs.slug != ''
        env:
          SPEC_FILE: ${{ steps.prep.outputs.spec_file }}
          RESPONSE_FILE: ${{ steps.llm.outputs['response-file'] }}
        run: |
          set -euo pipefail
          if [ -z "${RESPONSE_FILE:-}" ] || [ ! -f "$RESPONSE_FILE" ]; then
            echo "::error::Missing LLM response file from actions/ai-inference"
            exit 1
          fi
          cp "$RESPONSE_FILE" "$SPEC_FILE"
          cp "$SPEC_FILE" "${RUNNER_TEMP}/dev-spec-generated.md"
          echo "First lines:" && head -n 15 "$SPEC_FILE"

      - name: Validate required doc sections
        if: steps.slug.outputs.slug != ''
        env:
          SPEC_FILE: ${{ steps.prep.outputs.spec_file }}
        run: |
          set -euo pipefail
          required=(
            "## User story"
            "## Summary"
            "## Scope"
            "## User-visible behavior"
            "## Files changed"
            "## Implementation map"
            "## Data & persistence"
            "## APIs"
            "## Errors & edge cases"
            "## Testing"
            "## Traceability"
            "## Out of scope / follow-ups"
          )
          for h in "${required[@]}"; do
            if ! rg -n "^${h}$" "$SPEC_FILE" >/dev/null; then
              echo "::error::Missing required section heading: ${h}"
              exit 1
            fi
          done

      - name: Commit and open documentation PR
        if: steps.slug.outputs.slug != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.slug.outputs.slug }}
          SPEC_FILE: ${{ steps.prep.outputs.spec_file }}
          PR_NUM: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main
          BRANCH="docs/dev-spec-${SLUG}-pr-${PR_NUM}-run-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          mkdir -p "$(dirname "$SPEC_FILE")"
          cp "${RUNNER_TEMP}/dev-spec-generated.md" "$SPEC_FILE"
          git add "$SPEC_FILE"
          git commit -m "docs(spec): refresh ${SLUG} after approval of PR #${PR_NUM}" \
            -m "Generated by dev-spec-on-pr-approval workflow." \
            -m "Workflow: ${RUN_URL}" \
            -m "Co-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "docs(spec): ${SLUG} from approved PR #${PR_NUM}" \
            --body "Automated **development specification** update (GitHub Models via \`actions/ai-inference\`).

- Triggered by **approval** of #${PR_NUM} (target: \`main\`)
- Spec file: \`${SPEC_FILE}\`
- Prompts: \`docs/dev-specs/prompts/\` and \`.github/prompts/dev-spec-generate.prompt.yml\`
- Run log: ${RUN_URL}

Merge the feature PR when ready; this doc describes the approved diff.

Add \`Refs #your-spec-issue\` here if your course requires a linked tracking issue."
          echo "Opened docs PR from branch ${BRANCH}"
